services:
  # ---------------------------------------------------------
  # 1. IL MESSAGE BROKER (APACHE KAFKA UFFICIALE)
  # Deve partire per primo, non dipende da nessuno
  # ---------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9094:9094" # Porta mappata per l'host esterno (opzionale, ma raccomandata)
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      # Doppio listener: INTERNAL per la rete Docker, EXTERNAL per il localhost della tua macchina
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------
  # 2. IL MICROSERVIZIO IN INGRESSO (API GATEWAY)
  # Dipende da Kafka per poter salvare i messaggi
  # ---------------------------------------------------------
  api-gateway:
    build: ./gateway  # <-- Percorso alla cartella del Gateway
    container_name: banca-gateway
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy  # ORA ASPETTA CHE KAFKA SIA VERAMENTE PRONTO
    restart: unless-stopped

  # ---------------------------------------------------------
  # 3. IL GENERATORE DI TRAFFICO (TRANSACTION CLIENT)
  # Dipende dal Gateway per potergli inviare i dati
  # ---------------------------------------------------------
  transaction-client:
    build: ./client   # <-- Percorso alla cartella del Client (modifica se necessario)
    container_name: python_traffic_client
    restart: unless-stopped
    environment:
      # Punta al nome del container del Gateway, non a localhost!
      - GATEWAY_URL=http://api-gateway:8000/api/v1/transactions
      - SLEEP_TIME=1.5
    depends_on:
      api-gateway:
        condition: service_started
      kafka:
        condition: service_healthy

  # ---------------------------------------------------------
  # 4. IL MICROSERVIZIO DI VALUTAZIONE (EVALU)
  # ---------------------------------------------------------
  kafka-consumer:
    build: ./evaluation_system  # <-- Percorso alla cartella dell'Evaluation System
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------
  # 5. MONITORAGGIO (PROMETHEUS)
  # ---------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: atlas-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # ---------------------------------------------------------
  # 6. AGENTE DI SCALING MCP
  # ---------------------------------------------------------
  scaling-agent:
    build: ./scaling-agent
    container_name: atlas-scaling-agent
    ports:
      - "8001:8001"
      - "8002:8002"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - COMPOSE_PROJECT_NAME=atlas-code
      - COMPOSE_WORKDIR=/workspace
      - SCALING_MODE=daemon
      - CHECK_INTERVAL_SEC=10
      - SCALE_COOLDOWN_SEC=60
      - MIN_REPLICAS=1
      - MAX_REPLICAS=5
      - TARGET_SERVICE=kafka-consumer
      - LLM_ENABLED=true
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234/v1
      - LMSTUDIO_MODEL=qwen/qwen2.5-coder-14b
      - LLM_TIMEOUT_SEC=8
      - LLM_CONFIDENCE_THRESHOLD=0.75
      - LLM_MAX_TOKENS=250
      - LLM_TEMPERATURE=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
