x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_LOG_RETENTION_HOURS=1
      - KAFKA_LOG_RETENTION_BYTES=1073741824
      - KAFKA_LOG_SEGMENT_BYTES=104857600
      - KAFKA_LOG4J_ROOT_LOGLEVEL=WARN
      - KAFKA_TOOLS_LOG4J_LOGLEVEL=WARN
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 6
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  api-gateway:
    build: ./gateway
    container_name: banca-gateway
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  transaction-client:
    build: ./client
    container_name: python_traffic_client
    environment:
      - GATEWAY_URL=http://api-gateway:8000/api/v1/transactions
      - SLEEP_TIME=10.0
      - KAFKA_BROKER=kafka:9092
      - KAFKA_NOTIFICATION_TOPIC=transaction-notifications
    depends_on:
      api-gateway:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  enrichment-system:
    build: ./enrichment-system
    container_name: enrichment_system
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=raw-transactions
      - KAFKA_ENRICHED_TOPIC=enriched-transactions
      - KAFKA_GROUP_ID=enrichment_system_group
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  scoring-system:
    build:
      context: .
      dockerfile: ./scoring-system/Dockerfile
    container_name: scoring_system
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_ENRICHED_TOPIC=enriched-transactions
      - KAFKA_SCORED_TOPIC=scored-transactions
      - KAFKA_GROUP_ID=scoring_system_group
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_SOCKET_TIMEOUT=1.0
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - REDIS_PROFILE_TTL_SECONDS=86400
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=atlas_db
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atlas_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  kafka-connect:
    build:
      context: .
      dockerfile: Dockerfile.connect
    container_name: kafka-connect
    ports:
      - "8083:8083"
    environment:
      - CONNECT_BOOTSTRAP_SERVERS=kafka:9092
      - CONNECT_REST_ADVERTISED_HOST_NAME=kafka-connect
      - CONNECT_REST_PORT=8083
      - CONNECT_GROUP_ID=connect-cluster-group
      - CONNECT_CONFIG_STORAGE_TOPIC=_connect-configs
      - CONNECT_OFFSET_STORAGE_TOPIC=_connect-offsets
      - CONNECT_STATUS_STORAGE_TOPIC=_connect-status
      - CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR=1
      - CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR=1
      - CONNECT_STATUS_STORAGE_REPLICATION_FACTOR=1
      - CONNECT_KEY_CONVERTER=org.apache.kafka.connect.storage.StringConverter
      - CONNECT_VALUE_CONVERTER=io.confluent.connect.avro.AvroConverter
      - CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - CONNECT_PLUGIN_PATH=/usr/share/java,/usr/share/confluent-hub-components
      - CONNECT_LOG4J_ROOT_LOGLEVEL=WARN
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    logging: *default-logging

  setup-kafka-connect:
    image: curlimages/curl:latest
    container_name: setup-kafka-connect
    depends_on:
      kafka-connect:
        condition: service_started
    volumes:
      - ./sink-connector-config.json:/config.json
    command: >
      sh -c "
        echo 'Attendendo le API REST di Kafka Connect...';
        while [ $$(curl -s -o /dev/null -w %{http_code} http://kafka-connect:8083/connectors) -ne 200 ]; do
          echo 'Kafka Connect non è ancora pronto. Riprovo in 5 secondi...';
          sleep 5;
        done;
        echo 'Kafka Connect è pronto. Registro il connettore...';
        curl -X POST -H 'Content-Type: application/json' --data @/config.json http://kafka-connect:8083/connectors;
        echo '\nSetup del connettore completato con successo!';
      "
    logging: *default-logging

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    ports:
      - "8081:8081"
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL=WARN
    depends_on:
      kafka:
        condition: service_healthy
    logging: *default-logging

  notification-system:
    build: ./notification-system
    container_name: notification_broker
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_SCORED_TOPIC=scored-transactions
      - KAFKA_NOTIFICATION_TOPIC=transaction-notifications
      - KAFKA_GROUP_ID=notification_broker_group
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
      scoring-system:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    logging: *default-logging

  scaling-agent:
    build: ./scaling-agent
    container_name: scaling-agent
    ports:
      - "8001:8001"
      - "8002:8002"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-atlas-code}
      - COMPOSE_WORKDIR=/workspace
      - SCALING_MODE=daemon
      - SCALING_HTTP_HOST=0.0.0.0
      - SCALING_HTTP_PORT=8001
      - SCALING_METRICS_PORT=8002
      - TARGET_SERVICE=${TARGET_SERVICE:-enrichment-system}
      - LLM_ENABLED=${LLM_ENABLED:-true}
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - LMSTUDIO_MODEL=${LMSTUDIO_MODEL:-local-model}
      - LMSTUDIO_API_KEY=${LMSTUDIO_API_KEY:-}
      - CHECK_INTERVAL_SEC=${CHECK_INTERVAL_SEC:-60}
      - SCALE_COOLDOWN_SEC=${SCALE_COOLDOWN_SEC:-300}
      - MIN_REPLICAS=${MIN_REPLICAS:-1}
      - MAX_REPLICAS=${MAX_REPLICAS:-5}
      - CPU_THRESHOLD_PERCENT=${CPU_THRESHOLD_PERCENT:-70}
      - MEMORY_THRESHOLD_PERCENT=${MEMORY_THRESHOLD_PERCENT:-80}
      - REQUEST_RATE_THRESHOLD=${REQUEST_RATE_THRESHOLD:-100}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      prometheus:
        condition: service_started
      enrichment-system:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging