services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build: ./gateway
    container_name: banca-gateway
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  transaction-client:
    build: ./client
    container_name: python_traffic_client
    environment:
      - GATEWAY_URL=http://api-gateway:8000/api/v1/transactions
      - SLEEP_TIME=10.0
      - KAFKA_BROKER=kafka:9092
      - KAFKA_NOTIFICATION_TOPIC=transaction-notifications
    depends_on:
      api-gateway:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped

  enrichment-system:
    build: ./enrichment_system
    container_name: enrichment_system
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=raw-transactions
      - KAFKA_ENRICHED_TOPIC=enriched-transactions
      - KAFKA_GROUP_ID=enrichment_system_group
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  scoring-system:
    build:
      context: .
      dockerfile: ./scoring_system/Dockerfile
    container_name: scoring_system
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_ENRICHED_TOPIC=enriched-transactions
      - KAFKA_SCORED_TOPIC=scored-transactions
      - KAFKA_GROUP_ID=scoring_system_group
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_SOCKET_TIMEOUT=1.0
      - REDIS_PROFILE_TTL_SECONDS=86400
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notification-system:
    build: ./notification-system
    container_name: notification_broker
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_SCORED_TOPIC=scored-transactions
      - KAFKA_NOTIFICATION_TOPIC=transaction-notifications
      - KAFKA_GROUP_ID=notification_broker_group
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
      scoring-system:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 3
