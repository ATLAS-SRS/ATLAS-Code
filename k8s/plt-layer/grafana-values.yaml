grafana:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.127.0.0.1.nip.io
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://atlas-loki:3100
      isDefault: false
      editable: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: 'API Gateway'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      fastapi-metrics:
        gnetId: 14641        
        revision: 1     
        datasource: Prometheus