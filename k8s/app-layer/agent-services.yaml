apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-aiops-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atlas-aiops-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-aiops-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: atlas-aiops-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atlas-aiops-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-aiops-agent
  namespace: default
  labels:
    app.kubernetes.io/name: atlas-aiops-agent
    app.kubernetes.io/part-of: atlas-aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-aiops-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-aiops-agent
        app.kubernetes.io/part-of: atlas-aiops
    spec:
      serviceAccountName: atlas-aiops-sa
      containers:
        - name: agent
          image: atlas-aiops-agent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              value: "default"
            - name: TARGET_DEPLOYMENTS
              value: "api-gateway,scoring-system,enrichment-system,notification-system"
            - name: PROMETHEUS_URL
              value: "http://atlas-monitoring-kube-prom-prometheus.default.svc.cluster.local:9090"
            - name: LM_STUDIO_URL
              value: "http://host.docker.internal:1234/v1"
            - name: LLM_MODEL
              value: "google/gemma-4-26b-a4b"
