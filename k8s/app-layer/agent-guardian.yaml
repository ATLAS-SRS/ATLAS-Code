apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-aiops-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atlas-aiops-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "deployments/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-aiops-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: atlas-aiops-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atlas-aiops-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-aiops-agent
  namespace: default
  labels:
    app: agent-guardian
    app.kubernetes.io/name: atlas-aiops-agent
    app.kubernetes.io/part-of: atlas-aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-guardian
  template:
    metadata:
      labels:
        app: agent-guardian
        app.kubernetes.io/name: atlas-aiops-agent
        app.kubernetes.io/part-of: atlas-aiops
    spec:
      serviceAccountName: atlas-aiops-sa
      containers:
        - name: agent-guardian
          image: atlas/agent-guardian:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              value: "default"
            - name: TARGET_DEPLOYMENTS
              value: "api-gateway,scoring-system,enrichment-system,notification-system"
            - name: PROMETHEUS_URL
              value: "http://atlas-monitoring-kube-prom-prometheus.default.svc.cluster.local:9090"
            - name: GRAFANA_MCP_URL
              value: "http://grafana-mcp-service.default.svc.cluster.local:80/sse"
            - name: LLM_API_URL
              value: "https://litellm-proxy-1013932759942.europe-west8.run.app"
            - name: LLM_MODEL
              value: "gemini-2.5-pro" #"google/gemma-3-12b" or "local-model" # TODO: cambiare con il nome del modello LLM che si vuole utilizzare
            - name: OPTIMIZE_CONTEXT
              value: "false"
            - name: LLM_API_KEY # TODO: capire se usare il secret di kubernetes
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: LLM_API_KEY
            - name: LM_STUDIO_URL
              value: "http://host.docker.internal:1234/v1"
            - name: LMSTUDIO_BASE_URL
              value: "http://host.docker.internal:1234/v1"
            - name: LMSTUDIO_MODEL
              value: "google/gemma-3-12b"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-aiops-service
  namespace: default
  labels:
    app: agent-guardian
spec:
  selector:
    app: agent-guardian # Deve corrispondere alle label del Deployment
  ports:
    - protocol: TCP
      port: 8000       # La porta su cui Kubernetes espone il servizio
      targetPort: 8000 # La porta su cui è in ascolto il codice Python/FastAPI del tuo collega
  type: ClusterIP
