apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-guardian-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atlas-guardian-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "deployments/status", "statefulsets", "statefulsets/scale", "statefulsets/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-guardian-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: atlas-guardian-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atlas-guardian-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-guardian-agent
  namespace: default
  labels:
    app: agent-guardian
    app.kubernetes.io/name: atlas-guardian-agent
    app.kubernetes.io/part-of: atlas-guardian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-guardian
  template:
    metadata:
      labels:
        app: agent-guardian
        app.kubernetes.io/name: atlas-guardian-agent
        app.kubernetes.io/part-of: atlas-guardian
    spec:
      serviceAccountName: atlas-guardian-sa
      initContainers:
        - name: wait-for-grafana-mcp
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z grafana-mcp-service.default.svc.cluster.local 80; do echo "Waiting for grafana-mcp..."; sleep 3; done']
      containers:
        - name: agent-guardian
          image: atlas/agent-guardian:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "main_agent_guardian:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - name: NAMESPACE
              value: "default"
            - name: TARGET_DEPLOYMENTS
              value: "api-gateway,scoring-system,enrichment-system,notification-system,atlas-monitoring-grafana,atlas-kafka-broker,atlas-kafka-controller,atlas-postgres-postgresql,atlas-redis-master"
            - name: BUDGET_MAX_REPLICAS
              value: "2"
            - name: EMERGENCY_MAX_REPLICAS
              value: "5"
            - name: TOTAL_REPLICA_BUDGET
              value: "8"
            - name: REQUEST_TIMEOUT_SECONDS
              value: "300"
            - name: DEPLOYMENT_MIN_REPLICAS
              value: "api-gateway=1,scoring-system=1,enrichment-system=1,notification-system=1"
            - name: DEPLOYMENT_POD_COSTS
              value: "api-gateway=1,scoring-system=1,enrichment-system=1,notification-system=1"
            - name: PROMETHEUS_URL
              value: "http://atlas-monitoring-kube-prom-prometheus.default.svc.cluster.local:9090"
            - name: GRAFANA_MCP_URL
              value: "http://grafana-mcp-service.default.svc.cluster.local:80/sse"
            - name: LLM_API_URL
              value: "https://litellm-proxy-1013932759942.europe-west8.run.app"
            - name: LLM_MODEL
              value: "gemini-2.5-pro"
            - name: OPTIMIZE_CONTEXT
              value: "false"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: LLM_API_KEY
            - name: LM_STUDIO_URL
              value: "http://host.docker.internal:1234/v1"
            - name: LMSTUDIO_BASE_URL
              value: "http://host.docker.internal:1234/v1"
            - name: LMSTUDIO_MODEL
              value: "google/gemma-3-12b"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
          ports:
            - name: webhook
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-guardian-service
  namespace: default
  labels:
    app: agent-guardian
spec:
  selector:
    app: agent-guardian
  ports:
    - protocol: TCP
      name: webhook
      port: 8000
      targetPort: webhook
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-guardian-dashboard
  namespace: default
  labels:
    app: agent-guardian-dashboard
    app.kubernetes.io/name: atlas-guardian-dashboard
    app.kubernetes.io/part-of: atlas-guardian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-guardian-dashboard
  template:
    metadata:
      labels:
        app: agent-guardian-dashboard
        app.kubernetes.io/name: atlas-guardian-dashboard
        app.kubernetes.io/part-of: atlas-guardian
    spec:
      containers:
        - name: guardian-dashboard
          image: atlas/agent-guardian:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - entrypoint.sh
          env:
            - name: LLM_API_URL
              value: "https://litellm-proxy-1013932759942.europe-west8.run.app"
            - name: PYTHONPATH
              value: "/app"
            - name: LLM_MODEL
              value: "gemini-2.5-pro"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: LLM_API_KEY
            - name: LM_STUDIO_URL
              value: "http://host.docker.internal:1234/v1"
            - name: LMSTUDIO_BASE_URL
              value: "http://host.docker.internal:1234/v1"
            - name: LMSTUDIO_MODEL
              value: "google/gemma-3-12b"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: HEALTH_CHECK_PORT
              value: "8002"
          ports:
            - name: dashboard
              containerPort: 8501
              protocol: TCP
            - name: health
              containerPort: 8002
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-guardian-dashboard-service
  namespace: default
  labels:
    app: agent-guardian-dashboard
spec:
  selector:
    app: agent-guardian-dashboard
  ports:
    - protocol: TCP
      name: dashboard
      port: 8501
      targetPort: dashboard
    - protocol: TCP
      name: health
      port: 8002
      targetPort: health
  type: ClusterIP

