apiVersion: v1
kind: ServiceAccount
metadata:
  name: scaling-agent-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scaling-agent-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scaling-agent-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: scaling-agent-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scaling-agent-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaling-agent
  namespace: default
  labels:
    app: scaling-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scaling-agent
  template:
    metadata:
      labels:
        app: scaling-agent
    spec:
      serviceAccountName: scaling-agent-sa
      containers:
        - name: scaling-agent
          image: atlas/scaling-agent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PROMETHEUS_URL
              value: http://atlas-monitoring-kube-prom-prometheus.default.svc.cluster.local:9090
            - name: NAMESPACE
              value: default
            - name: TARGET_DEPLOYMENTS
              value: api-gateway,scoring-system,enrichment-system,notification-system
            - name: PROMQL_RPS_QUERY
              value: sum(rate(http_requests_total{job="api-gateway"}[1m]))
            - name: CHECK_INTERVAL
              value: "15"
            - name: MIN_REPLICAS
              value: "1"
            - name: MAX_REPLICAS
              value: "5"
            - name: AGENT_IDLE_RPS_HINT
              value: "0.05"
            - name: RPS_REPLICA_THRESHOLDS
              value: "5,15,30,60"
            - name: LM_STUDIO_URL
              value: http://host.docker.internal:1234/v1
            - name: LLM_MODEL
              value: qwen/qwen2.5-coder-14b
            - name: LLM_TIMEOUT
              value: "20"
            - name: LLM_TEMPERATURE
              value: "0"