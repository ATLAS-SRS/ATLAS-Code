apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: fraud-detection
    app.kubernetes.io/component: compute-layer
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: fraud-detection
        app.kubernetes.io/component: compute-layer
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-gateway
          image: atlas/api-gateway:latest
          imagePullPolicy: IfNotPresent
          command:
            ["uvicorn", "gateway:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Gi
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrichment-system
  labels:
    app.kubernetes.io/name: enrichment-system
    app.kubernetes.io/part-of: fraud-detection
    app.kubernetes.io/component: compute-layer
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: enrichment-system
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: enrichment-system
        app.kubernetes.io/part-of: fraud-detection
        app.kubernetes.io/component: compute-layer
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: enrichment-system
          image: atlas/enrichment-system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          env:
            - name: KAFKA_TOPIC
              value: raw-transactions
            - name: KAFKA_ENRICHED_TOPIC
              value: enriched-transactions
            - name: KAFKA_GROUP_ID
              value: enrichment-system-v1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
---
