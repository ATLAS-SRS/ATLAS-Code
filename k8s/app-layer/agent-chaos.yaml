apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-chaos-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atlas-chaos-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "deployments/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-chaos-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: atlas-chaos-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atlas-chaos-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-chaos-agent
  namespace: default
  labels:
    app: agent-chaos
    app.kubernetes.io/name: atlas-chaos-agent
    app.kubernetes.io/part-of: atlas-chaos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-chaos
  template:
    metadata:
      labels:
        app: agent-chaos
        app.kubernetes.io/name: atlas-chaos-agent
        app.kubernetes.io/part-of: atlas-chaos
    spec:
      serviceAccountName: atlas-chaos-sa
      containers:
        - name: agent-chaos
          image: atlas/agent-chaos:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: NAMESPACE
              value: "default"
            - name: TARGET_DEPLOYMENTS
              value: "api-gateway,scoring-system,enrichment-system,notification-system"
            - name: LLM_API_URL
              value: "https://litellm-proxy-1013932759942.europe-west8.run.app"
            - name: LLM_MODEL
              value: "gemini-2.5-pro"
            - name: OPTIMIZE_CONTEXT
              value: "false"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: LLM_API_KEY
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-chaos-service
  namespace: default
  labels:
    app: agent-chaos
spec:
  selector:
    app: agent-chaos
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
  type: ClusterIP