image:
  registry: docker.io
  repository: bitnamilegacy/kafka
  tag: "4.0.0-debian-12-r10"

kraft:
  enabled: true

zookeeper:
  enabled: false

controller:
  replicaCount: 1
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"
  persistence:
    size: 1Gi
  overrideConfiguration:
    offsets.topic.replication.factor: "1"
    transaction.state.log.replication.factor: "1"
    transaction.state.log.min.isr: "1"
    default.replication.factor: "1"
    min.insync.replicas: "1"

broker:
  replicaCount: 1
  heapOpts: "-Xms512m -Xmx512m"
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1024Mi"
  persistence:
    size: 2Gi

  overrideConfiguration:
    offsets.topic.replication.factor: "1"
    transaction.state.log.replication.factor: "1"
    transaction.state.log.min.isr: "1"
    default.replication.factor: "1"
    min.insync.replicas: "1"

metrics:
  enabled: true
  kafkaExporter:
    enabled: true
    resources:
      limits:
        memory: "128Mi"

listeners:
  client:
    protocol: PLAINTEXT