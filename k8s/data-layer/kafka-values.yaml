image:
  registry: docker.io
  repository: bitnamilegacy/kafka
  tag: "4.0.0-debian-12-r10"

kraft:
  enabled: true

zookeeper:
  enabled: false

controller:
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2000m"  
      memory: "1024Mi"
  overrideConfiguration:
    offsets.topic.replication.factor: "1"
    transaction.state.log.replication.factor: "1"
    transaction.state.log.min.isr: "1"
    default.replication.factor: "1"
    min.insync.replicas: "1"

broker:
  replicaCount: 1
  heapOpts: "-Xms1024m -Xmx1024m"
  resources:
    requests:
      cpu: "500m"
      memory: "1024Mi"
    limits:
      cpu: "3000m"  
      memory: "2048Mi"
  overrideConfiguration:
    offsets.topic.replication.factor: "1"
    transaction.state.log.replication.factor: "1"
    transaction.state.log.min.isr: "1"
    default.replication.factor: "1"
    min.insync.replicas: "1"

metrics:
  enabled: true
  kafkaExporter:
    enabled: true
    resources:
      limits:
        memory: "128Mi"

listeners:
  client:
    protocol: PLAINTEXT