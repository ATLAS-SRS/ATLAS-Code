apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
    spec:
      containers:
        - name: schema-registry
          # Usiamo Bitnami, più stabile per i test locali
          image: bitnamilegacy/schema-registry:7.5.0 
          ports:
            - containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_KAFKA_BROKERS
              value: "PLAINTEXT://atlas-kafka.default.svc.cluster.local:9092"
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:8081"
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
spec:
  selector:
    app: schema-registry
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081